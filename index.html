<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server's Responses — The Holy Mass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14100e;
    --bg-vignette: #0b0908;
    --page: #f4ecd8;
    --page-edge: #e6d8b3;
    --rubric: #7c1220;
    --rubric-soft: #98283a;
    --gold: #ab8a3f;
    --gold-bright: #c9a94f;
    --ink: #26201a;
    --ink-soft: #5a4e3d;
    --shadow: rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% -10%, #241c17 0%, var(--bg) 45%, var(--bg-vignette) 100%);
    color:var(--ink);
    font-family:'EB Garamond', serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:36px 16px 60px;
  }
  .brand{text-align:center; margin-bottom:24px;}
  .brand .cross{font-size:22px; color:var(--gold-bright); display:block; margin-bottom:6px; letter-spacing:2px;}
  .brand h1{
    font-family:'Cinzel', serif; font-weight:600; font-size:clamp(20px,3.2vw,32px);
    letter-spacing:2.5px; color:#f1e6c8; margin:0 0 6px; text-transform:uppercase;
  }
  .brand p{font-family:'EB Garamond', serif; font-style:italic; color:#b9ab8a; margin:0; font-size:14.5px; letter-spacing:.5px;}

  .missal-wrap{position:relative; width:100%; max-width:660px;}
  .ribbon{
    position:absolute; left:-2px; top:0; width:16px; height:46px;
    background:linear-gradient(180deg, var(--gold-bright), var(--rubric-soft));
    clip-path:polygon(0 0,100% 0,100% 78%,50% 100%,0 78%);
    box-shadow:0 2px 6px rgba(0,0,0,.4);
    transition:top .5s cubic-bezier(.65,0,.35,1);
    z-index:5;
  }
  .missal{
    position:relative;
    background:linear-gradient(180deg, var(--page) 0%, var(--page-edge) 100%);
    border-radius:4px 10px 10px 4px;
    box-shadow:0 18px 50px var(--shadow), 0 0 0 1px rgba(171,138,63,.35);
    padding:38px 40px 30px 46px;
    overflow:hidden;
  }
  .missal::before{content:""; position:absolute; left:0;top:0;bottom:0; width:6px; background:linear-gradient(180deg, var(--rubric), var(--gold));}
  .meta-row{display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid rgba(124,18,32,.25); padding-bottom:10px; margin-bottom:20px;}
  .step-count{font-family:'Cinzel', serif; font-size:11px; letter-spacing:2px; color:var(--ink-soft); text-transform:uppercase;}
  .section-label{font-family:'Cinzel', serif; font-size:13px; letter-spacing:1.5px; color:var(--rubric); text-transform:uppercase; font-weight:600; text-align:right;}

  .block{margin-bottom:22px;}
  .role{display:flex; align-items:center; gap:8px; font-family:'Cinzel', serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--rubric); margin-bottom:8px;}
  .role .dot{width:6px;height:6px;border-radius:50%;background:var(--rubric);display:inline-block;}
  .latin{font-size:20px; line-height:1.55; font-style:italic; color:var(--ink);}
  .rubric-note{font-size:14.5px; color:var(--ink-soft); font-style:italic;}
  .translation{margin-top:8px; font-size:14.5px; color:var(--ink-soft); font-style:normal;}
  .varies-tag{font-family:'Cinzel', serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); border:1px solid var(--gold); border-radius:10px; padding:1px 8px; margin-left:8px;}

  .hear-row{display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap;}
  .hear-btn, .mini-btn{
    display:inline-flex; align-items:center; gap:6px; background:none; border:1px solid var(--gold);
    color:var(--rubric-soft); border-radius:20px; padding:5px 14px; font-family:'EB Garamond', serif;
    font-size:13px; cursor:pointer; letter-spacing:.3px;
  }
  .hear-btn:hover, .mini-btn:hover{background:rgba(171,138,63,.12);}
  .mini-btn.rec-active{background:#8f0e0e; color:#fff; border-color:#8f0e0e;}
  .voice-note{font-size:12px; color:var(--ink-soft); font-style:italic;}

  .server-block{border-top:1px dashed rgba(124,18,32,.3); padding-top:18px;}
  .reveal-wrap{position:relative;}
  .reveal-bar{height:3px; width:100%; background:rgba(124,18,32,.15); border-radius:2px; overflow:hidden; margin-bottom:12px;}
  .reveal-bar-fill{height:100%; background:var(--rubric); width:100%; transform-origin:left;}
  @keyframes shrink{from{transform:scaleX(1);}to{transform:scaleX(0);}}
  .locked-msg{font-style:italic; color:var(--ink-soft); font-size:15px; padding:10px 0 4px;}
  .fading{animation: fadeout .45s forwards;}
  @keyframes fadeout{ to{opacity:0; height:0; margin:0; padding:0;} }

  .record-row{display:flex; align-items:center; gap:12px; margin-top:14px; flex-wrap:wrap;}
  .rec-btn{
    font-family:'Cinzel', serif; letter-spacing:1.5px; font-size:12px; text-transform:uppercase;
    border:none; border-radius:24px; padding:10px 20px; cursor:pointer; color:#fff5e6; background:var(--rubric);
    display:inline-flex; align-items:center; gap:8px; transition:transform .15s, background .2s;
  }
  .rec-btn:hover{transform:translateY(-1px); background:var(--rubric-soft);}
  .rec-btn:disabled{background:#c8bb9d;cursor:not-allowed;transform:none;color:#7c7157;}
  .rec-btn.recording{background:#8f0e0e; animation:pulse 1.1s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(143,14,14,.5);}50%{box-shadow:0 0 0 8px rgba(143,14,14,0);}}
  .rec-dot{width:9px;height:9px;border-radius:50%;background:#fff;display:inline-block;}
  .timer{font-family:'Cinzel', serif; font-size:13px; color:var(--ink-soft); min-width:44px;}
  audio{height:34px; max-width:220px;}
  .status-chip{font-size:12px; font-family:'Cinzel', serif; letter-spacing:1px; color:var(--gold); text-transform:uppercase;}

  .compare-box{margin-top:14px; background:rgba(124,18,32,.05); border:1px solid rgba(124,18,32,.18); border-radius:8px; padding:14px 16px;}
  .compare-row{margin-bottom:10px;}
  .compare-label{font-family:'Cinzel', serif; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-soft); display:block; margin-bottom:4px;}
  .compare-latin{font-size:17px;}
  .compare-heard{font-size:15px; color:var(--ink-soft); font-style:italic;}
  .w-ok{color:#2f6b2f;}
  .w-miss{color:var(--rubric); text-decoration:underline; text-decoration-color:rgba(124,18,32,.4);}
  .score-chip{display:inline-block; font-family:'Cinzel', serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:4px 12px; border-radius:14px; margin-top:4px;}
  .score-good{background:#2f6b2f; color:#eafbe6;}
  .score-mid{background:#a17a1e; color:#fff8e6;}
  .score-low{background:var(--rubric); color:#fff0ee;}
  .compare-note{margin-top:12px; font-size:13px; font-style:italic; color:var(--ink-soft);}

  .nav-row{display:flex; justify-content:space-between; align-items:center; max-width:660px; width:100%; margin-top:22px; gap:10px;}
  .nav-btn{
    font-family:'Cinzel', serif; letter-spacing:1.5px; font-size:12px; text-transform:uppercase; background:none;
    border:1px solid var(--gold); color:#e7d9b3; padding:9px 18px; border-radius:24px; cursor:pointer; white-space:nowrap;
  }
  .nav-btn:hover{background:rgba(171,138,63,.15);}
  .nav-btn:disabled{opacity:.35; cursor:not-allowed;}
  .dots{display:flex; gap:4px; flex-wrap:wrap; max-width:280px; justify-content:center;}
  .dots span{width:6px;height:6px;border-radius:50%;background:#443a2f;}
  .dots span.done{background:var(--gold-bright);}
  .dots span.current{background:var(--rubric-soft); box-shadow:0 0 0 3px rgba(124,18,32,.25);}

  .controls{display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap; justify-content:center; max-width:660px;}
  .seg{display:flex; border:1px solid var(--gold); border-radius:24px; overflow:hidden;}
  .seg button{background:none; border:none; color:#d9c9a0; font-family:'Cinzel', serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; padding:8px 14px; cursor:pointer;}
  .seg button.active{background:var(--rubric); color:#fff5e6;}
  .toggle-link{
    font-size:12px; font-family:'Cinzel', serif; letter-spacing:1px; color:#b9ab8a; text-transform:uppercase; cursor:pointer;
    background:none; border:1px solid rgba(185,171,138,.4); border-radius:24px; padding:8px 14px;
  }
  .toggle-link.active{color:var(--gold-bright); border-color:var(--gold-bright);}

  .cover, .summary, .settings-view, .recordpriest-view{max-width:660px; width:100%;}
  .cover .missal, .summary .missal, .settings-view .missal, .recordpriest-view .missal{padding:38px 40px 34px 46px;}
  .cover h2, .summary h2, .settings-view h2, .recordpriest-view h2{
    font-family:'Cinzel', serif; font-size:20px; letter-spacing:1.5px; color:var(--rubric); text-transform:uppercase; margin-top:0;
  }
  .cover p, .settings-view p{line-height:1.6; font-size:16px;}
  .begin-btn{
    font-family:'Cinzel', serif; letter-spacing:2px; text-transform:uppercase; font-size:13px; background:var(--rubric);
    color:#fff5e6; border:none; border-radius:26px; padding:12px 26px; cursor:pointer; margin-top:10px;
  }
  .begin-btn:hover{background:var(--rubric-soft);}
  .begin-btn.ghost{background:none; border:1px solid var(--gold); color:var(--rubric-soft);}
  .summary-item{border-bottom:1px solid rgba(124,18,32,.15); padding:12px 0;}
  .summary-item .sec{font-family:'Cinzel',serif; font-size:11px; letter-spacing:1px; color:var(--gold); text-transform:uppercase;}
  .summary-item .lat{font-style:italic; margin:4px 0 8px; font-size:15px;}
  .restart-btn{margin-top:18px;}

  .field-label{font-family:'Cinzel', serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-soft); display:block; margin:16px 0 6px;}
  .text-input{
    width:100%; padding:9px 12px; border:1px solid rgba(124,18,32,.3); border-radius:6px; font-family:'EB Garamond', serif;
    font-size:15px; background:#fffdf6;
  }
  select.text-input{cursor:pointer;}
  .settings-note{font-size:13px; color:var(--ink-soft); font-style:italic; margin-top:4px;}

  .rp-item{border-bottom:1px solid rgba(124,18,32,.15); padding:14px 0;}
  .rp-item .sec{font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:var(--gold); text-transform:uppercase;}
  .rp-item .lat{font-style:italic; margin:4px 0 10px; font-size:15px;}
  .rp-controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

  .progress-track{flex:1; height:4px; background:rgba(171,138,63,.25); border-radius:2px; max-width:200px;}
  .progress-fill{height:100%; background:var(--gold-bright); border-radius:2px; transition:width .3s;}

  footer{margin-top:30px; font-size:12px; color:#5f5748; font-style:italic; text-align:center;}

  @media (max-width:480px){
    .missal, .cover .missal, .summary .missal, .settings-view .missal, .recordpriest-view .missal{padding:28px 20px 22px 28px;}
    .latin{font-size:18px;}
    .meta-row{flex-direction:column; align-items:flex-start; gap:4px;}
    .section-label{text-align:left;}
  }
</style>
</head>
<body>

<div class="brand">
  <span class="cross">✝</span>
  <h1>Server's Responses — The Holy Mass</h1>
  <p>Traditional Latin Rite · Missa Lecta</p>
</div>

<div id="app">
  <div class="cover"><div class="missal"><p style="text-align:center;font-style:italic;">Loading…</p></div></div>
</div>
<footer>Speak clearly and unhurried, as at the altar rail.</footer>
<noscript><p style="color:#b9ab8a;text-align:center;">JavaScript is required. Please enable it and reload.</p></noscript>

{section:"Psalm 42 — Judica Me", priest:"Emítte lucem tuam, et veritátem tuam: ipsa me deduxérunt, et adduxérunt in montem sanctum tuum, et in tabernácula tua.", priestT:"Send forth Thy light and Thy truth: they have led me to Thy holy hill.",

{section:"Psalm 42 — Judica Me", priest:"Introíbo ad altáre Dei.", priestT:"I will go in unto the altar of God.",

{section:"Confiteor", priest:"Confíteor Deo omnipoténti, beátæ Maríæ semper Vírgini, beáto Michaéli Archángelo, beáto Joánni Baptístæ, sanctis Apóstolis Petro et Paulo, ómnibus Sanctis, et vobis fratres: quia peccávi nimis cogitatióne, verbo et ópere: mea culpa, mea culpa, mea máxima culpa. Ideo precor beátam Maríam semper Vírginem, beátum Michaélem Archángelum, beátum Joánnem Baptístam, sanctos Apóstolos Petrum et Paulum, omnes Sanctos, et vos fratres, oráre pro me ad Dóminum Deum nostrum.",

{section:"Confiteor", priest:"Amen.", priestT:"Amen.",

{section:"Credo", priest:"(The Creed is intoned by the Priest at the middle of the altar.)", priestT:"(intoned)",

{section:"Before the Offertory", priest:"Dóminus vobíscum.", priestT:"The Lord be with you.",

{section:"Offertory — Oráte Fratres", priest:"Oráte, fratres: ut meum ac vestrum sacrifícium acceptábile fiat apud Deum Patrem omnipoténtem.", priestT:"Pray, brethren, that my sacrifice and yours may be acceptable to God the Father almighty.",

/* ============ STATE ============ */
const app = document.getElementById('app');

function safeGetStorage(type, key, fallback){
  try{
    const store = type === 'session' ? sessionStorage : localStorage;
    const v = store.getItem(key);
    return (v === null || v === undefined) ? fallback : v;
  }catch(e){ return fallback; }
}
function safeSetStorage(type, key, val){
  try{
    const store = type === 'session' ? sessionStorage : localStorage;
    store.setItem(key, val);
  }catch(e){}
}

let state = {
  view: 'cover',
  level: safeGetStorage('local', 'altar_level', '1'),
  role: safeGetStorage('local', 'altar_role', 'ac1'),
  step: 0,
  sequence: [],
  movementResults: {},
  recordings: {},
  transcripts: {},
  priestRecordings: {},
  showTranslation: false,
  priestMode: safeGetStorage('local', 'altar_priestMode', 'browser'),
  voiceURI: safeGetStorage('local', 'altar_voiceURI', ''),
  elevenKey: safeGetStorage('local', 'altar_elevenKey', ''),
  elevenVoiceId: safeGetStorage('local', 'altar_elevenVoiceId', ''),
  elevenCache: {}
};

function stripAccents(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function buildSequence(role){
  const seq = [];
  for(let idx=0; idx<=STEPS.length; idx++){
    MOVEMENTS.filter(m=> m.insertBefore===idx && (m.role==='both' || m.role===role))
      .forEach(m=> seq.push({type:'movement', mq:m}));
    if(idx < STEPS.length) seq.push({type:'prayer', idx});
  }
  return seq;
}

/* ============ BROWSER TTS ============ */
let availableVoices = [];
function loadVoices(){
  if(!('speechSynthesis' in window)) return;
  availableVoices = window.speechSynthesis.getVoices();
}
if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}
function speakBrowser(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(stripAccents(text));
  let voice = availableVoices.find(v=>v.voiceURI === state.voiceURI);
  if(!voice) voice = availableVoices.find(v=>v.lang && v.lang.toLowerCase().startsWith('it')) || availableVoices.find(v=>v.default) || availableVoices[0];
  if(voice) u.voice = voice;
  u.rate = 0.82;
  u.pitch = 0.95;
  window.speechSynthesis.speak(u);
}

/* ============ ELEVENLABS TTS ============ */
async function speakEleven(text, i, statusEl){
  if(!state.elevenKey || !state.elevenVoiceId){
    if(statusEl) statusEl.textContent = 'Add your ElevenLabs API key & Voice ID in Voice Settings.';
    return;
  }
  if(state.elevenCache[i]){
    new Audio(state.elevenCache[i]).play();
    return;
  }
  if(statusEl) statusEl.textContent = 'Generating…';
  try{
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${state.elevenVoiceId}`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'xi-api-key': state.elevenKey, 'Accept':'audio/mpeg' },
      body: JSON.stringify({ text: text, model_id:'eleven_multilingual_v2', voice_settings:{stability:0.5, similarity_boost:0.75} })
    });
    if(!res.ok) throw new Error('ElevenLabs error ' + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    state.elevenCache[i] = url;
    if(statusEl) statusEl.textContent = '';
    new Audio(url).play();
  }catch(err){
    if(statusEl) statusEl.textContent = 'ElevenLabs request failed — check your key/voice ID.';
  }
}

function playPriestLine(i, statusEl){
  const s = STEPS[i];
  if(state.priestMode === 'custom'){
    if(state.priestRecordings[i]){ new Audio(state.priestRecordings[i]).play(); }
    else if(statusEl){ statusEl.textContent = 'No recording yet for this line — record it in "Record the Priest".'; }
  } else if(state.priestMode === 'eleven'){
    speakEleven(s.priest, i, statusEl);
  } else {
    speakBrowser(s.priest);
  }
}

/* ============ SPEECH-TO-TEXT SCORING (server's part) ============ */
function normToken(w){ return stripAccents(w).toLowerCase().replace(/[^a-z]/g,''); }
function alignAndScore(correctText, heardText){
  const correctTokens = correctText.replace(/\(.*?\)/g,'').split(/\s+/).filter(Boolean);
  const correctNorm = correctTokens.map(normToken);
  const heardNorm = heardText.split(/\s+/).filter(Boolean).map(normToken).filter(Boolean);
  const n = correctNorm.length, m = heardNorm.length;
  const dp = Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let a=1;a<=n;a++)for(let b=1;b<=m;b++){
    dp[a][b] = (correctNorm[a-1] && correctNorm[a-1]===heardNorm[b-1]) ? dp[a-1][b-1]+1 : Math.max(dp[a-1][b], dp[a][b-1]);
  }
  let a=n,b=m; const matched = new Array(n).fill(false);
  while(a>0 && b>0){
    if(correctNorm[a-1]===heardNorm[b-1]){ matched[a-1]=true; a--; b--; }
    else if(dp[a-1][b] >= dp[a][b-1]) a--;
    else b--;
  }
  const score = n ? Math.round((dp[n][m]/n)*100) : 0;
  const highlighted = correctTokens.map((tok,idx)=> matched[idx] ? `<span class="w-ok">${tok}</span>` : `<span class="w-miss">${tok}</span>`).join(' ');
  return {score, highlighted};
}
function renderComparison(i, transcript){
  const s = STEPS[i];
  const holder = document.getElementById('compareHolder');
  if(!holder) return;
  if(!transcript){
    holder.innerHTML = `<div class="compare-note">Speech recognition unavailable or heard nothing — recording saved, but no transcript to compare.</div>`;
    return;
  }
  const {score, highlighted} = alignAndScore(s.server, transcript);
  const cls = score>=85 ? 'score-good' : score>=55 ? 'score-mid' : 'score-low';
  holder.innerHTML = `
    <div class="compare-box">
      <div class="compare-row"><span class="compare-label">Correct (Latin)</span><div class="latin compare-latin">${highlighted}</div></div>
      <div class="compare-row"><span class="compare-label">You Said</span><div class="compare-heard">${transcript}</div></div>
      <div class="score-chip ${cls}">${score}% match</div>
    </div>`;
}

  app.innerHTML = `
    <div class="cover"><div class="missal">
      <h2>Before You Begin</h2>
      <p>Practice the server's responses for the whole of the Holy Mass — from the Prayers at the Foot of the Altar to the Last Gospel. Multiple-choice questions on the acolyte's movements are woven in at the right moments for your role.</p>
      <p><strong>Level I — Reveal:</strong> the response appears for five seconds, then hides before you record.<br>
      <strong>Level II — Memory:</strong> the response is never shown. Recall it and record.</p>
      <div class="seg" style="margin:16px 0;">
        <button data-lvl="1" class="${state.level==='1'?'active':''}">Level I</button>
        <button data-lvl="2" class="${state.level==='2'?'active':''}">Level II</button>
      </div>
      <div style="margin:12px 0;">
        <label class="field-label" style="margin-top:0;">Your Role</label>
        <div class="seg">
          <button data-role="ac1" class="${state.role==='ac1'?'active':''}">Acolyte 1 (Senior)</button>
          <button data-role="ac2" class="${state.role==='ac2'?'active':''}">Acolyte 2 (Junior)</button>
        </div>
      </div>
      <button class="begin-btn" id="beginBtn">Begin</button>
      <button class="begin-btn ghost" id="settingsBtn" style="margin-left:8px;">⚙ Voice Settings</button>
      <button class="begin-btn ghost" id="recPriestBtn" style="margin-left:8px;">🎙 Record the Priest</button>
    </div></div>`;
  app.querySelectorAll('.seg button[data-lvl]').forEach(b=>{
    b.onclick = ()=>{ state.level = b.dataset.lvl; safeSetStorage('local', 'altar_level', state.level); renderCover(); };
  });
  app.querySelectorAll('.seg button[data-role]').forEach(b=>{
    b.onclick = ()=>{ state.role = b.dataset.role; safeSetStorage('local', 'altar_role', state.role); renderCover(); };
  });
  document.getElementById('beginBtn').onclick = ()=>{
    state.sequence = buildSequence(state.role);
    state.movementResults = {};
    state.view='practice'; state.step=0; render();
  };
  document.getElementById('settingsBtn').onclick = ()=>{ state.view='settings'; render(); };
  document.getElementById('recPriestBtn').onclick = ()=>{ state.view='recordPriest'; render(); };
}
